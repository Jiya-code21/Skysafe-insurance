
<div id="erd" style="padding: 8px 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  roles {
    int role_id PK
    varchar role_name
    text permissions
    timestamp created_at
  }
  users {
    int user_id PK
    int role_id FK
    varchar name
    varchar email
    varchar password_hash
    varchar profile_pic
    enum status
    timestamp created_at
    timestamp updated_at
  }
  groups {
    int group_id PK
    int created_by FK
    varchar group_name
    text description
    timestamp created_at
  }
  group_members {
    int member_id PK
    int group_id FK
    int user_id FK
    enum role
    timestamp joined_at
  }
  meetings {
    int meeting_id PK
    int group_id FK
    int created_by FK
    varchar title
    text agenda
    datetime scheduled_at
    int duration_mins
    varchar meeting_link
    enum status
    timestamp created_at
  }
  activity_logs {
    int log_id PK
    int user_id FK
    varchar action
    varchar entity_type
    int entity_id
    text details
    timestamp created_at
  }
  notifications {
    int notification_id PK
    int user_id FK
    text message
    varchar type
    boolean is_read
    timestamp created_at
  }
  reviews {
    int review_id PK
    int reviewer_id FK
    int reviewee_id FK
    int group_id FK
    int rating
    text feedback
    timestamp created_at
  }
  project_files {
    int file_id PK
    int group_id FK
    int uploaded_by FK
    varchar file_name
    varchar file_path
    varchar file_type
    int file_size_kb
    timestamp uploaded_at
  }
  marks {
    int mark_id PK
    int user_id FK
    int group_id FK
    int reviewer_id FK
    decimal score
    decimal max_score
    text remarks
    timestamp awarded_at
  }
  roles ||--o{ users : "has"
  users ||--o{ groups : "creates"
  groups ||--o{ group_members : "has"
  users ||--o{ group_members : "joins"
  groups ||--o{ meetings : "hosts"
  users ||--o{ meetings : "schedules"
  users ||--o{ activity_logs : "generates"
  users ||--o{ notifications : "receives"
  users ||--o{ reviews : "gives"
  users ||--o{ reviews : "receives"
  groups ||--o{ reviews : "scoped to"
  groups ||--o{ project_files : "contains"
  users ||--o{ project_files : "uploads"
  users ||--o{ marks : "receives"
  groups ||--o{ marks : "associated"
  users ||--o{ marks : "awards"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
